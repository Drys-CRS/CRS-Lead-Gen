name: CRS Tender Intelligence Agent (Weekly)

# Runs every Monday at 00:00 UTC (02:00 SAST) — after the daily-ingest cron reset.
# Can also be triggered manually from the Actions tab with optional overrides.

on:
  schedule:
    - cron: '0 0 * * 1'        # Monday 00:00 UTC = 02:00 SAST
  workflow_dispatch:
    inputs:
      phases:
        description: 'Comma-separated phases to run: tenders,attack_signals,partners,apollo'
        default: 'tenders,attack_signals,partners,apollo'
      dry_run:
        description: 'Set to "true" to log output without writing to Supabase'
        default: 'false'

# A manual trigger cancels a stuck scheduled run.
concurrency:
  group: agent-tender
  cancel-in-progress: true

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ingest.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Run Tender Intelligence Agent
        env:
          # ── Required ──────────────────────────────────────────────────
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          # ── AI cascade (at least one required) ────────────────────────
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          NVIDIA_API_KEY:     ${{ secrets.NVIDIA_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          # ── Search backends (at least one required) ───────────────────
          SERPER_API_KEY:     ${{ secrets.SERPER_API_KEY }}
          SERPAPI_API_KEY:    ${{ secrets.SERPAPI_API_KEY }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID:      ${{ secrets.GOOGLE_CSE_ID }}
          # ── Enrichment (optional) ─────────────────────────────────────
          APOLLO_API_KEY:     ${{ secrets.APOLLO_API_KEY }}
        run: |
          set -eo pipefail
          python - <<'PYEOF'
          import os, sys
          sys.path.insert(0, "app")
          import tender_agent as agent

          agent.init_supabase()
          agent.init_ai()
          stats = agent.run_agent()

          # Fail the Action if more errors than successes
          total = stats["tenders"] + stats["attack_signals"] + stats["partners"]
          if total == 0 and stats["errors"] > 0:
              print("❌ Agent produced no output and had errors — failing CI", file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Write pipeline run record (always)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GHA_STATUS:   ${{ job.status }}
        run: |
          python - <<'PYEOF'
          import os, sys, datetime as dt
          try:
              from supabase import create_client
              sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_KEY"])
              status = "success" if os.environ.get("GHA_STATUS") == "success" else "failed"
              sb.table("pipeline_runs").insert({
                  "run_at":          dt.datetime.utcnow().isoformat(),
                  "status":          status,
                  "tenders_scraped": 0,
                  "tenders_scored":  0,
                  "error_log":       f"agent run · gha_status={os.environ.get('GHA_STATUS','')}",
                  "trigger":         "agent_weekly",
              }).execute()
              print(f"pipeline_runs record written: {status}")
          except Exception as e:
              print(f"Could not write pipeline_runs: {e}", file=sys.stderr)
          PYEOF
