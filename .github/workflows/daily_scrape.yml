name: Daily Tender Ingestion Pipeline

on:
  workflow_dispatch: # This enables the manual button and API trigger
  schedule:
    - cron: '0 6 * * *' # Runs at 06:00 AM every day

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install scrapy supabase python-dotenv requests

      - name: Run Spiders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          scrapy crawl etender_api
          scrapy crawl etender_awards
          scrapy crawl it_training_tenders