name: Daily Tender Ingestion Pipeline

on:
  workflow_dispatch: {}        # manual "Run workflow" button
  schedule:
    - cron: '0 1 * * *'        # 01:00 UTC = 03:00 SAST, after free-tier daily reset

# Never let two ingests overlap (a manual run won't collide with the scheduled one)
concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ingest.txt

      - name: Install dependencies
        run: |
          set -eo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Run daily ingest (scrape + AI-score + partner analysis)
        env:
          # ── Required: Supabase ──
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          # ── AI providers (cascade: Groq → Cerebras → OpenRouter → GitHub
          #    → NVIDIA → DeepSeek → Gemini). At least one is needed for scoring. ──
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_PAT:             ${{ secrets.GH_PAT }}            # GitHub Models token (NOT the Actions token)
          NVIDIA_API_KEY:     ${{ secrets.NVIDIA_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          # ── Tunables (optional — defaults shown) ──
          YEARS_BACK:         '3'      # OCDS history per country per run
          MAX_SCORE:          '300'    # max tenders AI-scored per run
          SCORE_TIME_BUDGET:  '3000'   # hard wall-clock cap (s) on the scoring phase
          DO_PARTNER:         'true'   # also refresh partner recommendations
          RUN_TRIGGER:        'github_action'
        run: |
          set -eo pipefail
          python -u app/Daily_ingest.py

      - name: Dump pipeline error log (always)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'PYEOF'
          import os, sys
          try:
              from supabase import create_client
              sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_KEY"])
              row = sb.table("pipeline_runs").select("run_at,status,tenders_scraped,tenders_scored,error_log") \
                      .order("run_at", desc=True).limit(1).execute().data
              if row:
                  r = row[0]
                  print(f"Last run: {r['run_at']}  status={r['status']}  scraped={r['tenders_scraped']}  scored={r['tenders_scored']}")
                  if r.get("error_log"):
                      print("ERROR LOG:", r["error_log"])
              else:
                  print("No pipeline_runs record found.")
          except Exception as e:
              print(f"Could not fetch pipeline log: {e}", file=sys.stderr)
          PYEOF
