name: Daily Tender Ingestion Pipeline

on:
  workflow_dispatch:
    inputs:
      years_back:
        description: 'Years of OCDS history to fetch (1 = current year only)'
        default: '1'
      max_score:
        description: 'Max tenders to AI-score'
        default: '100'
      include_non_ocds:
        description: 'Include World Bank / UNDP non-OCDS countries'
        default: 'true'
      skip_state_publishers:
        description: 'Skip sub-national publishers (Nigeria states etc.)'
        default: 'true'
  schedule:
    - cron: '0 1 * * *'        # 01:00 UTC = 03:00 SAST, after free-tier daily reset

# A new manual trigger cancels a stuck/slow scheduled run immediately.
concurrency:
  group: daily-ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # hard cap — down from 120; tuned params finish in ~30 min
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true   # allow Node.js 20 actions until Sep 2026
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ingest.txt

      - name: Install dependencies
        run: |
          set -eo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Run daily ingest (scrape + AI-score + partner analysis)
        env:
          # ── Required: Supabase ──
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          # ── AI providers (cascade: Groq → Cerebras → OpenRouter → GitHub
          #    → NVIDIA → DeepSeek → Gemini). At least one is needed for scoring. ──
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_PAT:             ${{ secrets.GH_PAT }}            # GitHub Models token (NOT the Actions token)
          NVIDIA_API_KEY:     ${{ secrets.NVIDIA_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:           ${{ secrets.HF_TOKEN }}
          # ── Tunables — manual dispatch overrides, otherwise use these defaults ──
          # years_back=1 → current-year data only (3x fewer downloads than 3)
          # max_score=100 → ~10-15 min of AI scoring vs 50+ min at 300
          # skip_state_publishers=true → skip Nigeria state-level OCDS feeds
          YEARS_BACK:              ${{ github.event.inputs.years_back || '1' }}
          MAX_SCORE:               ${{ github.event.inputs.max_score || '100' }}
          SCORE_TIME_BUDGET:       '1800'   # 30-min hard cap on scoring phase
          DO_PARTNER:              'true'
          INCLUDE_NON_OCDS:        ${{ github.event.inputs.include_non_ocds || 'true' }}
          SKIP_STATE_PUBLISHERS:   ${{ github.event.inputs.skip_state_publishers || 'true' }}
          RUN_TRIGGER:             'github_action'
        run: |
          set -eo pipefail
          python -u app/Daily_ingest.py

      - name: Dump pipeline error log (always)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'PYEOF'
          import os, sys
          try:
              from supabase import create_client
              sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_KEY"])
              row = sb.table("pipeline_runs").select("run_at,status,tenders_scraped,tenders_scored,error_log") \
                      .order("run_at", desc=True).limit(1).execute().data
              if row:
                  r = row[0]
                  print(f"Last run: {r['run_at']}  status={r['status']}  scraped={r['tenders_scraped']}  scored={r['tenders_scored']}")
                  if r.get("error_log"):
                      print("ERROR LOG:", r["error_log"])
              else:
                  print("No pipeline_runs record found.")
          except Exception as e:
              print(f"Could not fetch pipeline log: {e}", file=sys.stderr)
          PYEOF
