name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git config --global credential.helper "store --file ~/.hf-creds"
          printf 'https://DrystanGovender:%s@huggingface.co\n' "${HF_TOKEN}" > ~/.hf-creds
          git remote add hf https://huggingface.co/spaces/DrystanGovender/crs-competitive-intelligence
          git push hf main:main --force
