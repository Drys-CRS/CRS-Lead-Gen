name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://DrystanGovender:${HF_TOKEN}@huggingface.co/spaces/DrystanGovender/crs-competitive-intelligence
          git push hf main:main --force
